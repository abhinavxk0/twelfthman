<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>12thMan</title>
    <link rel="stylesheet" href="/styling/main.css" />
    <link rel="icon" href="favicon. ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
</head>

<body>
    <h1 id="title">12thMan</h1>

    <h2 id="comps"></h2>
    <div class="button-container" id="mainmenu">
        <button id="searchByCompetitions">Search by Competitions</button>
        <button id="searchByTeams">Search by Teams</button>
    </div>

    <div id="team-search-container" style="display: none;">
        <input type="text" id="team-search-box" placeholder="Search for a team..." />
        <button id="search-team-button">Search</button>
    </div>
    <div id="search-results"></div>
    <div id="loading"></div>
    <div id="competitions"></div>
    <h2 id="upcomingmatches"></h2>
    <div id="loadingmatches"></div>
    <div id="matches"></div>

    <script src="script.js"></script>
</body>

</html>
